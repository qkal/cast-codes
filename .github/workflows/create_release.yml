# Builds CastCodes OSS release assets and optionally publishes them to GitHub.
#
# The public fork does not depend on upstream Warp release infrastructure. This
# workflow intentionally avoids Sentry, GCS, Slack, Azure signing, and private
# channel configuration for OSS releases.

name: Create Release

on:
  workflow_call:
    inputs:
      channel:
        description: The channel to create release assets for.
        required: false
        type: string
        default: oss
      release_tag:
        description: Optional semver tag to build into artifacts.
        required: false
        type: string
        default: ""
      build_linux:
        description: Build Linux artifacts.
        type: boolean
        default: true
      build_windows:
        description: Build Windows artifacts.
        type: boolean
        default: true
      build_macos:
        description: Build macOS artifacts.
        type: boolean
        default: true
      build_web:
        description: Build web artifacts.
        type: boolean
        default: true
      should_publish:
        description: Publish this release.
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel.
        type: choice
        required: true
        default: oss
        options:
          - oss
      release_tag:
        description: Semver tag to publish or build into dry-run artifacts.
        type: string
        required: false
        default: v0.0.1
      publish:
        description: Create the GitHub release and upload assets.
        type: boolean
        default: false
      build_linux:
        description: Build Linux artifacts.
        type: boolean
        default: true
      build_windows:
        description: Build Windows artifacts.
        type: boolean
        default: true
      build_macos:
        description: Build macOS artifacts.
        type: boolean
        default: true
      build_web:
        description: Build web artifacts.
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: create-release-${{ inputs.channel || 'oss' }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CONFIG_FILE: ".github/workflows/release_configurations.json"

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_branch: ${{ steps.release_inputs.outputs.release_branch }}
      release_tag: ${{ steps.release_inputs.outputs.release_tag }}
      should_publish: ${{ steps.release_inputs.outputs.should_publish }}
      channel: ${{ steps.release_inputs.outputs.channel }}
      is_oss: ${{ steps.release_inputs.outputs.is_oss }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get channel configuration
        id: get-config
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ inputs.channel }}

      - name: Validate release inputs
        id: release_inputs
        shell: bash
        env:
          CHANNEL: ${{ steps.get-config.outputs.channel }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          PUBLISH_INPUT: ${{ inputs.publish }}
          SHOULD_PUBLISH_INPUT: ${{ inputs.should_publish }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          should_publish="${PUBLISH_INPUT:-${SHOULD_PUBLISH_INPUT:-false}}"
          release_tag="$RELEASE_TAG_INPUT"

          if [[ -z "$release_tag" ]]; then
            release_tag="v0.$GITHUB_SHA"
          fi

          if [[ "$should_publish" == "true" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]]; then
              echo "::error::Can only publish releases from the default branch ($DEFAULT_BRANCH)."
              exit 1
            fi

            if [[ "$CHANNEL" != "oss" ]]; then
              echo "::error::Manual publish is only enabled for the oss channel in this public fork."
              exit 1
            fi

            if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release tag must be a semver tag like v0.0.1."
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/$release_tag" >/dev/null 2>&1; then
              echo "::error::Release tag $release_tag already exists."
              exit 1
            fi
          fi

          echo "release_branch=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          if [[ "$CHANNEL" == "oss" ]]; then
            echo "is_oss=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_oss=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        if: ${{ steps.release_inputs.outputs.should_publish == 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_inputs.outputs.release_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Create GitHub release
        if: ${{ steps.release_inputs.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ steps.get-config.outputs.release_base_name }} ${{ steps.release_inputs.outputs.release_tag }}
          tag_name: ${{ steps.release_inputs.outputs.release_tag }}
          body: ${{ steps.get-config.outputs.release_body_text }}
          draft: false
          prerelease: ${{ steps.get-config.outputs.is_prerelease }}
          token: ${{ github.token }}

  release_macos_single_arch:
    name: Build Release (macOS ${{ matrix.dmg_name_suffix }})
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    if: ${{ inputs.build_macos != false }}
    timeout-minutes: 240
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            dmg_name_suffix: arm64
            runner: macos-26
          - arch: x86_64
            dmg_name_suffix: x86_64
            runner: macos-26-intel
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true
          use_cache: ${{ matrix.arch != 'aarch64' }}

      - name: Ensure rust target is installed
        run: rustup target add ${{ matrix.arch }}-apple-darwin
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build ${{ matrix.arch }} bundle
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail
          script/bundle --nosign --channel "$CHANNEL" --arch ${{ matrix.arch }} --dmg-name-suffix "${{ matrix.dmg_name_suffix }}"

      - name: Checksum DMG
        shell: bash
        run: shasum -a 256 "${{ steps.bundle_app.outputs.dmg_path }}" > "${{ steps.bundle_app.outputs.dmg_path }}.sha256"

      - name: Add DMG to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256
          token: ${{ github.token }}

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-macos-${{ matrix.arch }}-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256

      - name: Attest DMG
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256

      - name: Package arm64 CLI from app build
        if: ${{ matrix.arch == 'aarch64' }}
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.bundle_app.outputs.binary_path }}" cast-codes
          tar czf cast-codes-macos-aarch64.tar.gz cast-codes -C "$(dirname "${{ steps.bundle_app.outputs.bundled_resources_dir }}")" resources
          shasum -a 256 cast-codes-macos-aarch64.tar.gz > cast-codes-macos-aarch64.tar.gz.sha256

      - name: Add arm64 CLI to GitHub release assets
        if: ${{ matrix.arch == 'aarch64' && needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            cast-codes-macos-aarch64.tar.gz
            cast-codes-macos-aarch64.tar.gz.sha256
          token: ${{ github.token }}

      - name: Upload arm64 CLI as workflow artifact
        if: ${{ matrix.arch == 'aarch64' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-macos-cli-aarch64-${{ needs.prepare_release.outputs.channel }}
          path: |
            cast-codes-macos-aarch64.tar.gz
            cast-codes-macos-aarch64.tar.gz.sha256

      - name: Attest arm64 CLI
        if: ${{ matrix.arch == 'aarch64' && needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            cast-codes-macos-aarch64.tar.gz
            cast-codes-macos-aarch64.tar.gz.sha256

      - name: Create tar archive with build artifacts
        shell: bash
        run: |
          set -euo pipefail
          paths=(
            "${{ steps.bundle_app.outputs.binary_path }}"
            "${{ steps.bundle_app.outputs.dock_tile_plugin_dir }}"
          )
          for optional_path in \
            "${{ steps.bundle_app.outputs.dsym_path }}" \
            "${{ steps.bundle_app.outputs.dsym_realpath }}" \
            "${{ steps.bundle_app.outputs.frameworks_dir }}"; do
            if [[ -n "$optional_path" && -e "$optional_path" ]]; then
              paths+=("$optional_path")
            else
              echo "Skipping missing optional build artifact: $optional_path"
            fi
          done
          tar czfv build-artifacts.tar.gz "${paths[@]}"

      - name: Archive ${{ matrix.arch }} build artifacts for universal build
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-${{ matrix.arch }}-${{ needs.prepare_release.outputs.channel }}
          retention-days: 1
          compression-level: 0
          path: build-artifacts.tar.gz

  release_macos_universal:
    name: Build Release (macOS Universal)
    runs-on: macos-26
    needs: [prepare_release, release_macos_single_arch]
    if: ${{ inputs.build_macos != false }}
    timeout-minutes: 120
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Download aarch64 build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-aarch64-${{ needs.prepare_release.outputs.channel }}

      - name: Extract aarch64 build artifacts
        run: tar xvfz build-artifacts.tar.gz
        shell: bash

      - name: Download x86_64 build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-x86_64-${{ needs.prepare_release.outputs.channel }}

      - name: Extract x86_64 build artifacts
        run: tar xvfz build-artifacts.tar.gz
        shell: bash

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Bundle universal app
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail
          script/bundle --skip-build --nosign --channel "$CHANNEL"

      - name: Checksum universal DMG
        shell: bash
        run: shasum -a 256 "${{ steps.bundle_app.outputs.dmg_path }}" > "${{ steps.bundle_app.outputs.dmg_path }}.sha256"

      - name: Add universal DMG to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256
          token: ${{ github.token }}

      - name: Upload universal DMG as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-macos-universal-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256

      - name: Attest universal DMG
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_app.outputs.dmg_path }}
            ${{ steps.bundle_app.outputs.dmg_path }}.sha256

  release_macos_cli:
    name: Build Release (macOS CLI ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    if: ${{ inputs.build_macos != false }}
    timeout-minutes: 240
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-26-intel
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          is_self_hosted: false
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add ${{ matrix.arch }}-apple-darwin
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Build ${{ matrix.arch }} CLI
        id: bundle_cli
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail
          script/bundle --nosign --channel "$CHANNEL" --arch ${{ matrix.arch }} --artifact cli

      - name: Package CLI binary
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.bundle_cli.outputs.binary_path }}" cast-codes
          tar czf cast-codes-macos-${{ matrix.arch }}.tar.gz cast-codes -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources
          shasum -a 256 cast-codes-macos-${{ matrix.arch }}.tar.gz > cast-codes-macos-${{ matrix.arch }}.tar.gz.sha256

      - name: Add CLI to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            cast-codes-macos-${{ matrix.arch }}.tar.gz
            cast-codes-macos-${{ matrix.arch }}.tar.gz.sha256
          token: ${{ github.token }}

      - name: Upload CLI as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-macos-cli-${{ matrix.arch }}-${{ needs.prepare_release.outputs.channel }}
          path: |
            cast-codes-macos-${{ matrix.arch }}.tar.gz
            cast-codes-macos-${{ matrix.arch }}.tar.gz.sha256

      - name: Attest CLI
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            cast-codes-macos-${{ matrix.arch }}.tar.gz
            cast-codes-macos-${{ matrix.arch }}.tar.gz.sha256

  release_linux_x86:
    name: Build Release (Linux x86_64)
    runs-on: ubuntu-24.04
    needs: prepare_release
    if: ${{ inputs.build_linux != false }}
    timeout-minutes: 120
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      SETTINGS_SCHEMA_CACHE: ${{ github.workspace }}/.settings_schema_cache.json
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Show compiler versions
        run: |
          gcc --version
          g++ --version
        shell: bash

      - name: Install linuxdeploy
        run: script/linux/install_linuxdeploy

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Bundle app
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle --channel "$CHANNEL" --packages appimage,deb,rpm

      - name: Free runner space before Arch package
        shell: bash
        run: |
          set -euo pipefail
          df -h
          docker system prune -af || true
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h

      - name: Bundle Arch Linux package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: x86_64

      - name: Checksum Linux app packages
        shell: bash
        run: |
          set -euo pipefail
          find "${{ steps.bundle_app.outputs.packages_dir }}" -maxdepth 1 -type f ! -name '*.sha256' -print0 |
            while IFS= read -r -d '' file; do
              sha256sum "$file" > "$file.sha256"
            done

      - name: Add Linux app packages to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: ${{ steps.bundle_app.outputs.packages_dir }}/*
          token: ${{ github.token }}

      - name: Upload Linux app packages as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-linux-x86_64-${{ needs.prepare_release.outputs.channel }}
          path: ${{ steps.bundle_app.outputs.packages_dir }}

      - name: Attest Linux app packages
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ steps.bundle_app.outputs.packages_dir }}/*

  release_linux_cli_x86:
    name: Build Release (Linux CLI x86_64)
    runs-on: ubuntu-24.04
    needs: prepare_release
    if: ${{ inputs.build_linux != false }}
    timeout-minutes: 120
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      SETTINGS_SCHEMA_CACHE: ${{ github.workspace }}/.settings_schema_cache.json
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Show compiler versions
        run: |
          gcc --version
          g++ --version
        shell: bash

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Bundle CLI
        id: bundle_cli
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle --channel "$CHANNEL" --artifact cli --packages deb,rpm

      - name: Package CLI tar.gz
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.bundle_cli.outputs.executable_path }}" cast-codes
          tar czf cast-codes-linux-x86_64.tar.gz cast-codes -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources

      - name: Free runner space before Arch CLI package
        shell: bash
        run: |
          set -euo pipefail
          df -h
          docker system prune -af || true
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h

      - name: Bundle Arch Linux CLI package
        uses: ./.github/actions/bundle_arch_package
        with:
          channel: ${{ needs.prepare_release.outputs.channel }}
          release-tag: ${{ needs.prepare_release.outputs.release_tag }}
          arch: x86_64
          artifact: cli

      - name: Checksum Linux CLI packages
        shell: bash
        run: |
          set -euo pipefail
          find "${{ steps.bundle_cli.outputs.packages_dir }}" -maxdepth 1 -type f ! -name '*.sha256' -print0 |
            while IFS= read -r -d '' file; do
              sha256sum "$file" > "$file.sha256"
            done
          sha256sum cast-codes-linux-x86_64.tar.gz > cast-codes-linux-x86_64.tar.gz.sha256

      - name: Add Linux CLI packages to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            cast-codes-linux-x86_64.tar.gz
            cast-codes-linux-x86_64.tar.gz.sha256
          token: ${{ github.token }}

      - name: Upload Linux CLI packages as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-linux-cli-x86_64-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_cli.outputs.packages_dir }}
            cast-codes-linux-x86_64.tar.gz
            cast-codes-linux-x86_64.tar.gz.sha256

      - name: Attest Linux CLI packages
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            cast-codes-linux-x86_64.tar.gz
            cast-codes-linux-x86_64.tar.gz.sha256

  release_linux_arm:
    name: Build Release (Linux ARM64)
    runs-on: ubuntu-24.04-arm
    needs: prepare_release
    if: ${{ inputs.build_linux != false }}
    timeout-minutes: 120
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      SETTINGS_SCHEMA_CACHE: ${{ github.workspace }}/.settings_schema_cache.json
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Show compiler versions
        run: |
          gcc --version
          g++ --version
        shell: bash

      - name: Install linuxdeploy
        run: script/linux/install_linuxdeploy

      - name: Clean stale bundle output
        run: rm -rf target/*/bundle/linux
        shell: bash

      - name: Bundle app
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle --channel "$CHANNEL" --packages appimage,deb,rpm --arch aarch64

      - name: Bundle CLI
        id: bundle_cli
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle --channel "$CHANNEL" --artifact cli --packages deb,rpm --arch aarch64

      - name: Package CLI tar.gz
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.bundle_cli.outputs.executable_path }}" cast-codes
          tar czf cast-codes-linux-aarch64.tar.gz cast-codes -C "$(dirname "${{ steps.bundle_cli.outputs.bundled_resources_dir }}")" resources

      - name: Checksum Linux ARM packages
        shell: bash
        run: |
          set -euo pipefail
          for dir in "${{ steps.bundle_app.outputs.packages_dir }}" "${{ steps.bundle_cli.outputs.packages_dir }}"; do
            find "$dir" -maxdepth 1 -type f ! -name '*.sha256' -print0 |
              while IFS= read -r -d '' file; do
                sha256sum "$file" > "$file.sha256"
              done
          done
          sha256sum cast-codes-linux-aarch64.tar.gz > cast-codes-linux-aarch64.tar.gz.sha256

      - name: Add Linux ARM packages to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.packages_dir }}/*
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            cast-codes-linux-aarch64.tar.gz
            cast-codes-linux-aarch64.tar.gz.sha256
          token: ${{ github.token }}

      - name: Upload Linux ARM packages as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-linux-arm64-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_app.outputs.packages_dir }}
            ${{ steps.bundle_cli.outputs.packages_dir }}
            cast-codes-linux-aarch64.tar.gz
            cast-codes-linux-aarch64.tar.gz.sha256

      - name: Attest Linux ARM packages
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_app.outputs.packages_dir }}/*
            ${{ steps.bundle_cli.outputs.packages_dir }}/*
            cast-codes-linux-aarch64.tar.gz
            cast-codes-linux-aarch64.tar.gz.sha256

  release_web:
    name: Build Release (Web)
    runs-on: ubuntu-24.04
    needs: prepare_release
    if: ${{ inputs.build_web != false }}
    timeout-minutes: 90
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: wasm
          is_self_hosted: false

      - name: Bundle web app
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/wasm/bundle --channel "$CHANNEL"

      - name: Brotli compress app bundle
        shell: bash
        run: |
          set -euo pipefail
          brotli --rm "${{ steps.bundle_app.outputs.packages_dir }}"/*
          for file in "${{ steps.bundle_app.outputs.packages_dir }}"/*.br; do
            mv -- "$file" "${file%.br}"
          done

      - name: Checksum web assets
        shell: bash
        run: |
          set -euo pipefail
          for dir in "${{ steps.bundle_app.outputs.packages_dir }}" "${{ steps.bundle_app.outputs.assets_dir }}"; do
            find "$dir" -maxdepth 1 -type f ! -name '*.sha256' -print0 |
              while IFS= read -r -d '' file; do
                sha256sum "$file" > "$file.sha256"
              done
          done

      - name: Add web assets to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.packages_dir }}/*
            ${{ steps.bundle_app.outputs.assets_dir }}/*
          token: ${{ github.token }}

      - name: Upload web assets as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-web-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_app.outputs.packages_dir }}
            ${{ steps.bundle_app.outputs.assets_dir }}

      - name: Attest web assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_app.outputs.packages_dir }}/*
            ${{ steps.bundle_app.outputs.assets_dir }}/*

  release_windows:
    name: Build Release (Windows ${{ matrix.arch }})
    runs-on: windows-2025
    needs: prepare_release
    if: ${{ inputs.build_windows != false }}
    timeout-minutes: 150
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          persist-credentials: false

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          cache_key: ${{ matrix.arch }}
          is_self_hosted: false
          install_release_deps: true

      - name: Add arm64 target
        if: ${{ matrix.arch == 'arm64' }}
        run: rustup target add aarch64-pc-windows-msvc
        shell: bash

      - name: Build binary
        id: build_binary
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle -Channel "$CHANNEL" -skip_build_installer --arch ${{ matrix.arch }}

      - name: Bundle app
        id: bundle_app
        shell: bash
        env:
          CHANNEL: ${{ needs.prepare_release.outputs.channel }}
          GIT_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: script/bundle -Channel "$CHANNEL" -skip_build_binary --arch ${{ matrix.arch }}

      - name: Checksum Windows installer
        shell: bash
        run: sha256sum "${{ steps.bundle_app.outputs.installer_path }}" > "${{ steps.bundle_app.outputs.installer_path }}.sha256"

      - name: Add installer to GitHub release assets
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          files: |
            ${{ steps.bundle_app.outputs.installer_path }}
            ${{ steps.bundle_app.outputs.installer_path }}.sha256
          token: ${{ github.token }}

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-windows-${{ matrix.arch }}-${{ needs.prepare_release.outputs.channel }}
          path: |
            ${{ steps.bundle_app.outputs.installer_path }}
            ${{ steps.bundle_app.outputs.installer_path }}.sha256

      - name: Attest installer
        if: ${{ needs.prepare_release.outputs.should_publish == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            ${{ steps.bundle_app.outputs.installer_path }}
            ${{ steps.bundle_app.outputs.installer_path }}.sha256

  verify_release_jobs:
    name: Verify release jobs
    runs-on: ubuntu-24.04
    needs:
      - prepare_release
      - release_macos_single_arch
      - release_macos_universal
      - release_macos_cli
      - release_linux_x86
      - release_linux_cli_x86
      - release_linux_arm
      - release_web
      - release_windows
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - name: Check required release jobs
        shell: bash
        run: |
          set -euo pipefail
          failed=()

          check_result() {
            local name="$1"
            local result="$2"
            local enabled="$3"
            if [[ "$enabled" != "true" ]]; then
              return
            fi
            if [[ "$result" != "success" ]]; then
              failed+=("$name=$result")
            fi
          }

          check_result "macos-single-arch" "${{ needs.release_macos_single_arch.result }}" "${{ inputs.build_macos }}"
          check_result "macos-universal" "${{ needs.release_macos_universal.result }}" "${{ inputs.build_macos }}"
          check_result "macos-cli" "${{ needs.release_macos_cli.result }}" "${{ inputs.build_macos }}"
          check_result "linux-x86" "${{ needs.release_linux_x86.result }}" "${{ inputs.build_linux }}"
          check_result "linux-cli-x86" "${{ needs.release_linux_cli_x86.result }}" "${{ inputs.build_linux }}"
          check_result "linux-arm" "${{ needs.release_linux_arm.result }}" "${{ inputs.build_linux }}"
          check_result "web" "${{ needs.release_web.result }}" "${{ inputs.build_web }}"
          check_result "windows" "${{ needs.release_windows.result }}" "${{ inputs.build_windows }}"

          if (( ${#failed[@]} )); then
            printf '::error::Release job failures: %s\n' "${failed[*]}"
            exit 1
          fi

          echo "All enabled release jobs completed successfully."
